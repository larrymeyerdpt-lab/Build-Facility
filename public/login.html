<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — BUILD Facility</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FDF6EE; --card: #FFFFFF; --accent: #C67B3C; --accent-dark: #9E5E28;
    --text: #3D2E1F; --text-light: #A8957F; --border: #E8DDD0;
    --red: #A8442A; --red-soft: #F4DCD2;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 4px 24px rgba(61,46,31,0.10); padding: 36px 32px; max-width: 400px; width: 100%;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  .sub { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 14px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); transition: border-color 0.2s; }
  input:focus { outline: none; border-color: var(--accent); }
  button { width: 100%; margin-top: 22px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
  button:hover { background: var(--accent-dark); }
  button:disabled { opacity: 0.6; cursor: wait; }
  .err { background: var(--red-soft); color: var(--red); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 14px; display: none; }
  .err.shown { display: block; }
  .footer { text-align: center; margin-top: 22px; font-size: 11px; color: var(--text-light); }
</style>
</head>
<body>
  <div class="card">
    <h1>BUILD Facility</h1>
    <p class="sub">Sign in to manage facility bookings</p>
    <form id="loginForm" autocomplete="on">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <div class="err" id="err"></div>
      <button type="submit" id="submit">Sign in</button>
    </form>
    <div class="footer">Authorized users only · Larry & Savannah</div>
  </div>

<script>
const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
const btn = document.getElementById('submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.classList.remove('shown');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const resp = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = data.error === 'invalid_credentials' ? 'Invalid username or password.' : 'Sign-in failed. Try again.';
      errEl.classList.add('shown');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  } catch (err) {
    errEl.textContent = 'Network error. Try again.';
    errEl.classList.add('shown');
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});

// If already logged in, redirect
fetch('/api/auth').then(r => r.json()).then(d => { if (d.ok) window.location.href = '/'; }).catch(() => {});
</script>
</body>
</html>
